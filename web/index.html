<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F172A">
    <title>قرآن کریم</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        
        .app-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            min-height: 90vh;
        }
        
        .header {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: white;
            padding: 24px 20px;
            text-align: center;
        }
        
        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        
        .header-subtitle {
            font-size: 13px;
            opacity: 0.7;
            font-weight: 300;
        }
        
        .tabs {
            display: flex;
            background: #F8FAFC;
            padding: 8px;
            gap: 6px;
        }
        
        .tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            font-weight: 500;
            color: #64748B;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .content {
            display: none;
            padding: 16px;
            max-height: calc(90vh - 180px);
            overflow-y: auto;
        }
        
        .content.active {
            display: block;
        }
        
        .content::-webkit-scrollbar {
            width: 6px;
        }
        
        .content::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .content::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }
        
        .chapter-item, .juz-item {
            background: white;
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #F1F5F9;
        }
        
        .chapter-item:hover, .juz-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.15);
            border-color: #E0E7FF;
        }
        
        .chapter-number {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .chapter-info {
            flex: 1;
            min-width: 0;
        }
        
        .chapter-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #0F172A;
        }
        
        .chapter-trans {
            font-size: 13px;
            color: #64748B;
            margin-bottom: 3px;
            font-weight: 400;
        }
        
        .chapter-meta {
            font-size: 12px;
            color: #94A3B8;
            font-weight: 300;
        }
        
        .bookmark-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: #F8FAFC;
            cursor: pointer;
            font-size: 20px;
            flex-shrink: 0;
            border-radius: 12px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .bookmark-btn:hover {
            background: #FEF3C7;
            transform: scale(1.1);
        }
        
        .bookmark-btn.active {
            background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #94A3B8;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state-text {
            font-size: 15px;
            font-weight: 400;
        }
        
        .juz-number {
            font-size: 18px;
            font-weight: 600;
            color: #0F172A;
            margin-bottom: 4px;
        }
        
        .juz-info {
            font-size: 13px;
            color: #64748B;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: white;
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .modal-title {
            flex: 1;
        }
        
        .modal-chapter-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .modal-chapter-info {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .modal-body {
            padding: 20px;
            max-height: calc(85vh - 100px);
            overflow-y: auto;
        }
        
        .verse-item {
            background: #F8FAFC;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 16px;
            border-right: 4px solid #667eea;
        }
        
        .verse-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .verse-text {
            font-size: 22px;
            line-height: 2;
            color: #0F172A;
            margin-bottom: 12px;
            font-weight: 400;
        }
        
        .verse-trans {
            font-size: 14px;
            color: #64748B;
            line-height: 1.8;
            font-weight: 300;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94A3B8;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E2E8F0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            
            .app-container {
                border-radius: 0;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-title">قرآن کریم</div>
            <div class="header-subtitle">114 سوره • 30 جز</div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab(0)">
                <span>⭐</span> نشان شده
            </div>
            <div class="tab" onclick="showTab(1)">
                <span>📖</span> سوره‌ها
            </div>
            <div class="tab" onclick="showTab(2)">
                <span>📚</span> جزها
            </div>
        </div>
        
        <div id="bookmarks" class="content active"></div>
        <div id="chapters" class="content"></div>
        <div id="juz" class="content"></div>
    </div>
    
    <div id="modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div class="modal-title">
                    <div class="modal-chapter-name" id="modalChapterName"></div>
                    <div class="modal-chapter-info" id="modalChapterInfo"></div>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
